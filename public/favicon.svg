<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-5" y="-5" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.5"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.4"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="shieldGradient" x1="32" y1="8" x2="32" y2="52" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="shine" x1="18" y1="12" x2="40" y2="34" gradientUnits="userSpaceOnUse">
      <stop stop-color="white" stop-opacity="0.4"/>
      <stop offset="1" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Main Shield -->
  <path d="M32 8L50 16V34C50 46 42.5 53.5 32 56.5C21.5 53.5 14 46 14 34V16L32 8Z" fill="url(#shieldGradient)" filter="url(#shadow)"/>
  <!-- Glossy Shine Overlay -->
  <path d="M32 10L48 17.5V33.5C48 44.5 41 51 32 54C23 51 16 44.5 16 33.5V17.5L32 10Z" fill="url(#shine)"/>
  <!-- Apex Logo 'A' -->
  <path d="M32 20L25 40H29L30.5 35H33.5L35 40H39L32 20ZM32 25L33.2 31H30.8L32 25Z" fill="white"/>
</svg>
